name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install ruff
      run: pip install ruff

    - name: Ruff check
      run: ruff check src tests loan.py build.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Qt system libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libegl1 libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3 \
          libfontconfig1 libnss3 libxcomposite1 libxdamage1 \
          libxrandr2 libxtst6 libxcursor1 libasound2t64

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run test suite
      env:
        QT_QPA_PLATFORM: offscreen
      run: pytest tests/ -v --tb=short

  build-windows:
    name: Build Windows Application
    runs-on: windows-latest
    needs: [lint, test]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies (Python)
      run: |
        python -m pip install --upgrade pip
        pip install nuitka pillow zstandard
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Install System Tools (Inno Setup)
      run: |
        choco install innosetup

        # Add Inno Setup to PATH (standard install location)
        echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

    - name: Build Portable App (Nuitka)
      # --assume-yes-for-downloads ensures Nuitka downloads MinGW/ccache if needed without hanging
      run: |
        python build.py --assume-yes-for-downloads

    - name: Build Installer (Inno Setup)
      # Uses the setup.iss file to create the .exe installer
      run: |
        iscc setup.iss

    - name: Upload Artifact - Portable Folder
      uses: actions/upload-artifact@v4
      with:
        name: LoanMaster-Portable
        path: build/loan.dist

    - name: Upload Artifact - Installer
      uses: actions/upload-artifact@v4
      with:
        name: LoanMaster-Installer
        path: build/LoanMasterSetup.exe
